# Set my shell as default
set-option -g default-shell /bin/zsh


unbind C-z # disable suspend-client
unbind C-b # cancel the default prefix
set -g prefix C-Space # setting the prefix
set -s escape-time 1 # setting the escape time of prefix
bind C-Space send-prefix # make sure prefix can be sent in other applications

set -g mouse on # enable mouse

set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
setw -g mode-keys vi # enable vim mode


# Split panes with \ and -
bind - split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %


# Session keybinds
bind C-c new-session # create new session
bind C-f command-prompt -p find-session 'switch-client -t %%' # find session
bind k kill-window


# Dev layout: nvim left, two shells right (vertical + horizontal split)
bind m rename-window "#{b:pane_current_path}" \; split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-pane -t 0 \; send-keys "nvim" Enter \; select-pane -t 1 \; send-keys "claude" Enter \; select-pane -t 1
bind M select-pane -t 0 \; send-keys Escape ':qa!' Enter \; kill-pane -a


# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf


# don't rename windows automatically
set-option -g allow-rename off


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

#--------------------------------------------------------
#---------------- UI CUSTOMIZATION ----------------------

set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

#--------------------------------------------------------

# PATH: prepend ~/.local/bin and Homebrew dirs (only those that exist).
# macOS GUI terminals don't inherit shell PATH, so tmux needs help finding tools.
if-shell '[ -d /opt/homebrew/bin ]' \
  'set-environment -g PATH "$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"' \
  'set-environment -g PATH "$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin"'
run '~/.tmux/plugins/tpm/tpm'

# Override Nord window-status formats after TPM (delayed so Nord doesn't clobber them)
run-shell 'sleep 0.5 && tmux source-file ~/Code/.dotfiles/tmux/status-overrides.conf'

# Clear Claude notification icon when switching to or focusing a window
set -g focus-events on
set-hook -g after-select-window "set-window-option -u @claude_notify"
set-hook -g pane-focus-in "set-window-option -u @claude_notify"

# Pane styling (after TPM so Nord doesn't override)
set -g pane-active-border-style 'fg=#d08770'
set -g pane-border-style 'fg=#2e3440'
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g window-style 'fg=#616e88,bg=#242933'
set -g window-active-style 'fg=#eceff4,bg=#2e3440'
