# Window status format overrides (sourced after TPM/Nord)
# Third segment: ◉ (active), ⚡ (claude needs attention), - (inactive)
set -g window-status-format "#[fg=black,bg=brightblack,nobold,noitalics,nounderscore] #[fg=white,bg=brightblack]#I #[fg=white,bg=brightblack,bold]#[nobold] #[fg=white,bg=brightblack]#W #[fg=white,bg=brightblack,bold]#[nobold] #[fg=colour166,bg=brightblack]#{?#{@claude_notify},⚡,#[fg=white]-} #[fg=brightblack,bg=black,nobold,noitalics,nounderscore]"
set -g window-status-current-format "#[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#I #[fg=black,bg=cyan,bold]#[nobold] #[fg=black,bg=cyan]#W #[fg=black,bg=cyan,bold]#[nobold] #[fg=colour166,bg=cyan]#{?#{@claude_notify},⚡,#[fg=black]◉} #[fg=cyan,bg=black,nobold,noitalics,nounderscore]"
